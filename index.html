<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Wport</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    /* ── Background image ── */
    .bg {
      position: fixed;
      inset: 0;
      /* mobile default → image (3) */
      background: url('image (3).webp') center center / cover no-repeat;
      z-index: 0;
    }

    /* laptop / desktop → image (2) */
    @media (min-width: 768px) {
      .bg {
        background: url('image (2).webp') center center / cover no-repeat;
      }
    }

    /* ── Dark overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.88) 0%, rgba(0, 0, 0, 0.32) 100%);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Popup card ── */
    .popup {
      background: #ffffff;
      border-radius: 24px;
      width: 100%;
      max-width: 340px;
      padding: 32px 24px 24px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.45), 0 8px 24px rgba(0, 0, 0, 0.2);
      animation: popIn 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.78) translateY(24px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }

    /* ── Bell icon ── */
    .icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #e8eaf6;
      margin-bottom: 20px;
    }

    .icon-wrap svg {
      width: 30px;
      height: 30px;
      fill: #3949ab;
    }

    /* ── Title ── */
    .popup-title {
      font-size: 22px;
      font-weight: 400;
      color: #1a1a2e;
      line-height: 1.4;
      margin-bottom: 28px;
    }

    .popup-title strong {
      font-weight: 700;
    }

    /* ── Subtitle ── */
    .popup-sub {
      font-size: 13px;
      font-weight: 500;
      color: #7986cb;
      letter-spacing: 0.4px;
      margin-top: -16px;
      margin-bottom: 24px;
    }

    /* ── Button stack ── */
    .btn-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      width: 100%;
      padding: 15px 20px;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
      letter-spacing: 0.1px;
    }

    .btn:active {
      transform: scale(0.97);
      filter: brightness(0.93);
    }

    .btn-allow {
      background: #dce8ff;
      color: #1a4bbf;
    }

    .btn-allow:hover {
      background: #c8dbff;
    }

    .btn-deny {
      background: #e8eaf0;
      color: #3949ab;
    }

    .btn-deny:hover {
      background: #dde0ec;
    }

    /* ── Responsive tweaks ── */
    @media (max-width: 380px) {
      .popup { padding: 26px 18px 20px; border-radius: 20px; }
      .popup-title { font-size: 20px; }
      .btn { font-size: 16px; padding: 14px 16px; }
    }

    @media (min-width: 768px) {
      .popup { max-width: 380px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="overlay" id="overlay">
    <div class="popup" role="dialog" aria-modal="true" aria-labelledby="popup-title">

      <!-- Bell icon -->
      <div class="icon-wrap" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
        </svg>
      </div>

      <p class="popup-title" id="popup-title">
        <strong>Try our App for Free</strong>
      </p>

      <p class="popup-sub">No Ads &bull; Faster Speed &bull; Better UI/UX</p>

      <div class="btn-stack">
        <button class="btn btn-allow" onclick="goYes()">Yes</button>
        <button class="btn btn-deny"  onclick="goNo()">No</button>
      </div>

    </div>
  </div>

  <script>
    var yes = 'https://shopclicksunlimitedcentral.info?';
    var no  = 'https://guidezone.site/p44Npc?external_id={exid}';

    function goYes() { window.location.href = yes; }
    function goNo()  { window.location.href = no;  }
  </script>

</body>
</html>
